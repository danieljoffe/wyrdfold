[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/wyrdfold-api/Dockerfile"

[deploy]
startCommand = "uv run --package wyrdfold-api uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8001}"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
