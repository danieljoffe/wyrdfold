[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/wyrdfold-api/Dockerfile"

# NOTE: Railway config-as-code only covers the build/deploy SETTINGS sections
# — it cannot define service environment variables (those live in the Railway
# dashboard / CLI `railway variables`). Set these there for production:
#   - SENTRY_ENVIRONMENT=production   (so Sentry tags events as prod; the
#     default in app/config.py is "development")
#   - DEBUG_ERRORS is intentionally LEFT UNSET → fail-closed generic 500
#     bodies. The 500 handler in app/main.py no longer keys verbose error
#     detail off SENTRY_ENVIRONMENT (that was fail-open, audit #29 R3 / H5);
#     it is generic by default and only verbose when DEBUG_ERRORS=true.

[deploy]
# No startCommand on purpose (#29 C1): the start command is the Dockerfile CMD
# (uvicorn WITH --proxy-headers). A [deploy].startCommand OVERRIDES that CMD,
# and the previous one ran `uv run …` — uv is builder-only, absent from the
# runtime image, so it resolved to `uv: not found` — and it dropped
# --proxy-headers (without which uvicorn trusts the LB IP for every request,
# collapsing the pre-auth rate-limit buckets). The Dockerfile CMD is the single
# source of truth; test_deploy_config.py guards this.
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
