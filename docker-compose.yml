# Self-host quickstart for the WyrdFold API. The database lives in your
# Supabase project (hosted or self-hosted Supabase) — see README.md.
#
#   cp apps/wyrdfold-api/.env.example apps/wyrdfold-api/.env   # fill it in
#   docker compose up --build api
#
# The Next.js app is best run with `pnpm nx dev wyrdfold` (or deployed to
# Vercel); point its WYRDFOLD_API_URL at http://localhost:8001.
services:
  api:
    build:
      context: .
      dockerfile: apps/wyrdfold-api/Dockerfile
    env_file: apps/wyrdfold-api/.env
    environment:
      # Container-internal; the host port mapping below is what you call.
      PORT: 8001
      # Self-hosting without Vercel cron? Uncomment to run the in-process
      # poll scheduler instead (see .env.example for details).
      # POLL_SCHEDULER_ENABLED: "true"
    ports:
      - '8001:8001'
    restart: unless-stopped

    # --- Hardening (#30 F3) --------------------------------------------------
    # The app writes only to stdout/stderr at runtime — no files, no
    # local cache. Mounting the rootfs read-only blocks an exploit that
    # tries to drop a binary. /tmp stays writable via tmpfs because
    # uvicorn + pandoc occasionally use it.
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    # The container runs as a non-root user (uid 1001) per the Dockerfile,
    # so dropping ALL Linux capabilities is safe; nothing in the app
    # needs CAP_NET_BIND_SERVICE or similar.
    cap_drop:
      - ALL
    # Modest defaults that fit a typical self-host VPS. Raise these if
    # you see real cost from LLM-heavy paths.
    mem_limit: 1g
    mem_reservation: 256m
    pids_limit: 256
