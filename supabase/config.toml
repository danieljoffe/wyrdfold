# For detailed configuration reference documentation, visit:
# https://supabase.com/docs/guides/local-development/cli/config
#
# ============================================================================
# WyrdFold Supabase project
# ============================================================================
# This is the only Supabase project root in the wyrdfold repo. It backs the
# wyrdfold product (apps/wyrdfold + apps/wyrdfold-api). Driven with the plain
# CLI from the repo root, e.g. `pnpm supabase db push` / `pnpm db:gen-types`.
project_id = "wyrdfold"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
health_timeout = "2m"
# Must match the remote major version. Supabase projects run Postgres 17.
major_version = 17

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[db.network_restrictions]
enabled = false
allowed_cidrs = ["0.0.0.0/0"]
allowed_cidrs_v6 = ["::/0"]

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

# Resume uploads. If the source project stores uploaded resumes in a Storage
# bucket (not just the ``uploaded_resumes`` table), declare it here and migrate
# the objects. Confirm at cutover — uncomment + adjust as needed.
# [storage.buckets.resumes]
# public = false
# file_size_limit = "10MiB"
# allowed_mime_types = ["application/pdf", "application/vnd.openxmlformats-officedocument.wordprocessingml.document"]

[storage.s3_protocol]
enabled = true

[storage.analytics]
enabled = false
max_namespaces = 5
max_tables = 10
max_catalogs = 2

[storage.vector]
enabled = false
max_buckets = 10
max_indexes = 5

[auth]
enabled = true
# !!! LOCAL-ONLY !!! site_url is for ``supabase start`` (local dev). The
# production value is pinned under ``[remotes.production.auth]`` below — always
# push with ``--linked-to production`` so the localhost default never leaks into
# prod. (Supabase silently rewrites unmatched ``emailRedirectTo`` to site_url,
# so a bare ``config push`` would point every emailed magic link at localhost.)
site_url = "http://localhost:3100"
# Supabase silently substitutes ``site_url`` when ``emailRedirectTo`` is not an
# EXACT match here. List every dev variant wyrdfold is served from.
additional_redirect_urls = [
  "http://localhost:3000",
  "http://localhost:3000/auth/callback",
  "http://localhost:3100",
  "http://localhost:3100/auth/callback",
  "http://127.0.0.1:3000",
  "http://127.0.0.1:3000/auth/callback",
  "http://127.0.0.1:3100",
  "http://127.0.0.1:3100/auth/callback",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 6
password_requirements = ""

[auth.rate_limit]
email_sent = 2
sms_sent = 30
anonymous_users = 30
token_refresh = 150
sign_in_sign_ups = 30
token_verifications = 30
web3 = 30

[auth.email]
# wyrdfold is magic-link only. Signup-via-email stays enabled so first-time
# magic-link requests can mint a user; password flows are unused.
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = false
max_frequency = "1s"
otp_length = 6
otp_expiry = 3600

# WyrdFold beta — branded email templates.
#
# !!! IMPORTANT !!! No [auth.email.template.*] blocks live in the base config.
# Free-tier preview projects reject ANY email-template API call (subject-only
# edits included). The full configuration lives under
# [remotes.production.auth.email.template.*] at the bottom of this file and is
# applied only via ``supabase config push --linked-to production``. Local dev
# uses Inbucket, which captures mail regardless of template overrides.

[auth.sms]
enable_signup = false
enable_confirmations = false
template = "Your code is {{ .Code }}"
max_frequency = "5s"

[auth.sms.twilio]
enabled = false
account_sid = ""
message_service_sid = ""
auth_token = "env(SUPABASE_AUTH_SMS_TWILIO_AUTH_TOKEN)"

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = false
verify_enabled = false

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false
otp_length = 6
template = "Your code is {{ .Code }}"
max_frequency = "5s"

[auth.web3.solana]
enabled = false

[auth.third_party.firebase]
enabled = false

[auth.third_party.auth0]
enabled = false

[auth.third_party.aws_cognito]
enabled = false

[auth.third_party.clerk]
enabled = false

[auth.oauth_server]
enabled = false
authorization_url_path = "/oauth/consent"
allow_dynamic_registration = false

[edge_runtime]
enabled = true
policy = "per_worker"
inspector_port = 8083
deno_version = 2

[analytics]
enabled = true
port = 54327
backend = "postgres"

[experimental]
orioledb_version = ""
s3_host = "env(S3_HOST)"
s3_region = "env(S3_REGION)"
s3_access_key = "env(S3_ACCESS_KEY)"
s3_secret_key = "env(S3_SECRET_KEY)"

# ============================================================================
# Remote-specific overrides
# ============================================================================
# Everything above is LOCAL-DEV config. Push auth config to the hosted wyrdfold
# project ONLY via ``supabase config push --linked-to production`` so the
# localhost site_url/redirects never overwrite prod.

[remotes.production]
# wyrdfold project ref (Supabase dashboard → Project Settings → Reference ID).
project_id = "swxiuutaikxbirauivjg"

[remotes.production.auth]
site_url = "https://wyrdfold.com"
additional_redirect_urls = [
  "https://wyrdfold.com",
  "https://wyrdfold.com/auth/callback",
  "http://localhost:3000",
  "http://localhost:3000/auth/callback",
  "http://localhost:3100",
  "http://localhost:3100/auth/callback",
]

# Email templates — DISABLED until the project is on a paid plan (or a custom
# SMTP provider is configured). Supabase's free tier with the default email
# provider rejects ANY email-template API call with HTTP 400, which fails
# `supabase config push`. Magic-link/invite emails still send via Supabase's
# default templates — this only affects WyrdFold branding. The HTML lives in
# supabase/templates/. To re-enable: upgrade the plan (or set [auth.email.smtp]),
# then uncomment the two blocks below and re-run `supabase config push`.
# content_path is resolved relative to the repo root.
#
# # Sent by ``auth.admin.inviteUserByEmail`` (apps/wyrdfold/scripts/invite-beta-tester.ts).
# [remotes.production.auth.email.template.invite]
# subject = "You're in — welcome to the WyrdFold beta"
# content_path = "./supabase/templates/invite.html"
#
# # Sent by ``signInWithOtp`` from apps/wyrdfold/src/app/login/MagicLinkForm.tsx.
# [remotes.production.auth.email.template.magic_link]
# subject = "Your WyrdFold sign-in link"
# content_path = "./supabase/templates/magic-link.html"
