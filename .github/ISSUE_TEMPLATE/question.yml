name: Question
description: Ask about how something works, configuration, deployment
labels: [question]
body:
  - type: markdown
    attributes:
      value: |
        Before asking, please check the
        [README self-host quickstart](../blob/main/README.md#self-hosting-quickstart)
        and existing issues — most config questions are already covered.

  - type: textarea
    id: question
    attributes:
      label: What do you want to know?
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Context (if relevant)
      description: |
        If you're asking about a specific deployment, share enough to
        ground the answer.
      value: |
        - Deployment: <Vercel + Railway / docker-compose / local dev>
        - WyrdFold commit / tag:
