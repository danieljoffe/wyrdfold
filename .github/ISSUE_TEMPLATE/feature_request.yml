name: Feature request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the problem?
      description: What can't you do today, or what's frustrating?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
      description: |
        A rough sketch is fine — UI flow, API shape, config knob.
        Skip implementation details unless you've already prototyped.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you considered
      description: Why those didn't fit.

  - type: textarea
    id: context
    attributes:
      label: Anything else?
      description: Links, screenshots, related issues.
