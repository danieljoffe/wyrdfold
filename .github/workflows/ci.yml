name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Detect whether the PR touches anything other than docs (*.md / docs/ /
  # .claude/). The heavy jobs below gate on this, so a docs-only PR skips the
  # full suite instead of waiting minutes on Python/RLS/E2E/Lighthouse/Trivy.
  # A job skipped via `if:` reports its required check as "skipped", which the
  # branch-protection ruleset treats as passing — so docs-only PRs stay
  # mergeable without the checks actually running. Non-PR events (push to main,
  # i.e. a release merge) always run the full suite.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      code: ${{ steps.detect.outputs.code }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          filter: tree:0
          fetch-depth: 0
          persist-credentials: false
      - name: Detect non-docs changes
        id: detect
        env:
          EVENT: ${{ github.event_name }}
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "$EVENT" != "pull_request" ]; then
            echo "Non-PR event ($EVENT) → run full CI."
            echo "code=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          changed="$(git diff --name-only "$BASE...$HEAD")"
          echo "Changed files:"; echo "$changed"
          # Docs-only ⇒ EVERY changed file is *.md / docs/ / .claude/. Any other
          # file ⇒ code=true (run the full suite). Pure-shell case match (no grep)
          # so the verdict never depends on a tool's exit-code quirk. A mixed PR
          # (docs + code) is code=true. Empty diff ⇒ code=true (fail-safe).
          if [ -z "$changed" ]; then
            echo "Empty diff → running full CI (fail-safe)."
            echo "code=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          code=false
          while IFS= read -r f; do
            case "$f" in
              *.md|docs/*|.claude/*) : ;;        # docs-only, ignore
              *) code=true; break ;;             # any other file → run CI
            esac
          done <<< "$changed"
          if [ "$code" = true ]; then
            echo "→ code changes present; running full CI."
          else
            echo "→ docs-only change; skipping the code checks."
          fi
          echo "code=$code" >> "$GITHUB_OUTPUT"

  js:
    name: JS — lint, typecheck, test, build
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          filter: tree:0
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fails on any known advisory in the production dependency tree.
      # Dev-chain advisories are handled via pnpm overrides (see #21);
      # production must stay at zero.
      - name: Audit production dependencies
        run: pnpm audit --prod

      # run-many (not affected) — only 3 projects; local Nx cache plus the
      # pnpm store cache keep this fast. wyrdfold-api is Python; it runs
      # in the `python` job below.
      - name: Lint, typecheck, test, build
        run: pnpm nx run-many -t lint typecheck test build --exclude=wyrdfold-api --nxBail

  e2e:
    name: E2E — public specs (Playwright)
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          filter: tree:0
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright chromium
        run: pnpm exec playwright install chromium --with-deps

      # Build once up front so the e2e webServer can boot a production
      # `next start` instead of `next dev`. The previous setup served via
      # `next dev`, which compiles each route on first hit — the
      # middleware spec alone visits 11 unique URLs, each a cold
      # multi-second compile, which dominated the job's wall-clock time.
      # The build cost (~30-60s) plus near-zero per-route latency wins by
      # several minutes over `next dev`.
      - name: Build wyrdfold (for e2e production server)
        run: pnpm nx build wyrdfold --prod

      # Zero-secret by design: with no Supabase env, the playwright config
      # registers only the `public-chromium` project (login form, middleware
      # redirects, security headers). The `setup`/`authed-chromium` projects
      # self-skip — they require real Supabase creds and stay local-only
      # so CI keeps needing no secrets at all.
      - name: Run public e2e specs
        run: pnpm nx e2e wyrdfold-e2e

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: apps/wyrdfold-e2e/test-output/
          retention-days: 7

  lighthouse:
    name: Lighthouse — public CWV / a11y
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          filter: tree:0
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `lhci autorun` boots `nx run wyrdfold:start` per lighthouserc.json,
      # which needs a built .next/ to serve. Same pattern the e2e job uses.
      - name: Build wyrdfold (for the production server lhci probes)
        run: pnpm nx build wyrdfold --prod

      # ubuntu-latest preinstalls google-chrome-stable — lhci finds it
      # via chrome-launcher without any extra setup step.
      # Assertions in lighthouserc.json: accessibility ≥ 0.9 fails the
      # build; performance/best-practices/SEO ≥ 0.9/0.8 only warn so a
      # measurement blip doesn't block PRs.
      - name: Run Lighthouse CI
        run: pnpm exec lhci autorun

      - name: Upload Lighthouse reports on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 7

  python:
    name: Python — wyrdfold-api
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          filter: tree:0
          fetch-depth: 0
          persist-credentials: false

      # 3.11 to match the production Dockerfile (python:3.11-slim) — test
      # what we ship.
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python dependencies
        run: uv sync --frozen

      # Python advisory gate (audit #29 round-3 L3). Trivy (image-scan job) is
      # the only other Python-tree gate and runs `--ignore-unfixed` against the
      # OS/library DB, so it misses unfixed and PyPI-only (PyPA) advisories.
      # pip-audit queries the OSV database directly against the exact resolved
      # tree exported from the committed `uv.lock` (`--all-groups` so dev/test
      # deps are covered too). Non-zero exit on any advisory fails the PR.
      #
      # `uvx` runs pip-audit in an ephemeral, isolated env without polluting the
      # synced project venv. The audit covers the whole locked tree, not just
      # direct deps, because transitive packages are where most CVEs land. The
      # round-3 audit confirmed this tree is clean per OSV, so this passes today
      # and becomes the regression gate going forward.
      - name: Audit Python dependencies (pip-audit / OSV)
        run: |
          set -euo pipefail
          uv export --package wyrdfold-api --all-groups --no-emit-project --no-hashes > /tmp/reqs.txt
          uvx pip-audit --requirement /tmp/reqs.txt --no-deps --strict --progress-spinner off

      # python-docx resume/cover-letter rendering tests shell out to pandoc.
      # Install the pinned .deb straight from the pandoc GitHub release rather
      # than `apt-get update && apt-get install`: the apt path intermittently
      # hung for ~15 min on a slow mirror and the job was cancelled (flaky CI).
      # curl has explicit connect/max timeouts + retries so it can't hang the
      # job; apt stays as a fallback, and timeout-minutes bounds the worst case.
      #
      # The .deb is fetched over HTTPS with no signature, so verify its sha256
      # against the recorded hash for the pinned version before `dpkg -i`. A
      # tampered/corrupted download fails the job loudly instead of being
      # installed. Re-record PANDOC_SHA256 whenever PANDOC_VERSION changes
      # (`curl -fsSL <url> | sha256sum`).
      - name: Install pandoc
        timeout-minutes: 5
        run: |
          set -euo pipefail
          PANDOC_VERSION=3.1.3
          PANDOC_SHA256=caa7e0410f9e2cb1da2eb8db13cc97b5548fe455985e2c944e3929d22f99bcdc
          if curl -fsSL --retry 3 --connect-timeout 15 --max-time 120 \
               -o /tmp/pandoc.deb \
               "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb"; then
            echo "${PANDOC_SHA256}  /tmp/pandoc.deb" | sha256sum -c -
            sudo dpkg -i /tmp/pandoc.deb
          else
            sudo apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y pandoc
          fi
          pandoc --version

      - name: Lint, typecheck, test
        working-directory: apps/wyrdfold-api
        run: |
          uv run --package wyrdfold-api ruff check .
          uv run --package wyrdfold-api mypy app/
          uv run --package wyrdfold-api pytest -v

  # RLS integration (#6 R4). The `tests/integration/` suite is deselected by
  # default (`-m 'not integration'`) because it needs a live Postgres+PostgREST
  # to actually exercise Row-Level Security — the mock suite can't. Without this
  # job nothing runs it, and it bit-rotted unnoticed (#6). Here we boot the real
  # local Supabase stack and run it, so RLS regressions fail a PR.
  rls-integration:
    name: RLS — integration (live Supabase)
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          filter: tree:0
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python dependencies
        run: uv sync --frozen

      # Install the Supabase CLI from its pinned GitHub-release .deb (mirrors the
      # pandoc step) rather than a third-party action, to keep CI dependencies
      # version-pinned and avoid an unpinned `uses:`. curl has explicit timeouts
      # + retries so a slow mirror can't hang the job.
      #
      # The .deb is fetched over HTTPS with no signature, so verify its sha256
      # against the recorded hash for the pinned version before `dpkg -i`. A
      # tampered/corrupted download fails the job loudly instead of being
      # installed. Re-record SUPABASE_CLI_SHA256 whenever SUPABASE_CLI_VERSION
      # changes (`curl -fsSL <url> | sha256sum`).
      - name: Install Supabase CLI
        timeout-minutes: 5
        run: |
          set -euo pipefail
          SUPABASE_CLI_VERSION=2.104.0
          SUPABASE_CLI_SHA256=bfca4efe4aa88c65b29a59187f12b711b80fd119bc38464423795a4bf41b0e15
          curl -fsSL --retry 3 --connect-timeout 15 --max-time 180 \
            -o /tmp/supabase.deb \
            "https://github.com/supabase/cli/releases/download/v${SUPABASE_CLI_VERSION}/supabase_${SUPABASE_CLI_VERSION}_linux_amd64.deb"
          echo "${SUPABASE_CLI_SHA256}  /tmp/supabase.deb" | sha256sum -c -
          sudo dpkg -i /tmp/supabase.deb
          supabase --version

      # ubuntu-latest preinstalls Docker. `supabase start` boots the local stack
      # (Postgres + PostgREST + GoTrue + Storage) and applies every migration,
      # so the suite exercises real RLS against the current schema. config.toml
      # already disables the heavy unused services (imgproxy/edge-runtime/pooler).
      - name: Start Supabase stack
        run: supabase start

      # Guard against a false green: if the stack weren't reachable the conftest
      # would SKIP the whole suite (pytest still exits 0). Confirm REST answers
      # before running, so a stack failure fails the job loudly.
      - name: Verify Supabase REST is reachable
        run: |
          for _ in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:54321/rest/v1/ || echo 000)
            if [ "$code" -ge 200 ] && [ "$code" -lt 500 ]; then echo "REST up ($code)"; exit 0; fi
            sleep 2
          done
          echo "Supabase REST not reachable" >&2; exit 1

      # `-o addopts=''` clears the default `-m 'not integration'` + coverage opts
      # so the integration marker actually selects (conftest self-skips if the
      # stack is somehow unreachable, which would surface as 0 tests, not a pass).
      - name: Run RLS integration tests
        working-directory: apps/wyrdfold-api
        run: uv run --package wyrdfold-api pytest tests/integration/ -m integration -o addopts='' -v

      - name: Stop Supabase stack
        if: always()
        run: supabase stop || true

  # Image scan (#30 F5). Builds the same Dockerfile the deploy uses and
  # scans the result with Trivy. Fails on HIGH/CRITICAL OS or library
  # CVEs in the runtime layer. Complements `pnpm audit --prod` (JS tree)
  # by covering the python:3.11-slim base + transitive Python deps.
  image-scan:
    name: Image scan — Trivy
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          filter: tree:0
          fetch-depth: 0
          persist-credentials: false

      - name: Build wyrdfold-api image
        run: docker build -f apps/wyrdfold-api/Dockerfile -t wyrdfold-api:ci .

      # Scan via `docker run` against a pinned Trivy image rather than
      # `aquasecurity/trivy-action`. The action wraps a binary install
      # step (download from GitHub releases) that has been flaking with
      # exit 1 on the runner without surfacing a useful reason — running
      # the official Trivy container directly removes that hop entirely
      # and pins the scanner version we audit against.
      #
      # `os,library` covers Debian packages from the slim base AND the
      # Python deps resolved into /app/.venv by the builder stage.
      # `ignore-unfixed` keeps the gate firing only on actionable
      # findings. `.trivyignore` documents the accepted-risk transitive
      # build-tool CVEs with expiry dates.
      #
      # The scanner image is pinned by digest (not just the mutable 0.69.1
      # tag): it runs with the host docker socket mounted, so a re-tagged or
      # compromised image would execute against the daemon. The tag is kept
      # alongside the digest for readability. Re-resolve the digest whenever
      # the version is bumped (`docker buildx imagetools inspect aquasec/trivy:<ver>`
      # or `docker manifest inspect aquasec/trivy:<ver>`).
      - name: Scan with Trivy
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD/.trivyignore:/.trivyignore:ro" \
            aquasec/trivy:0.69.1@sha256:1c78ed1ef824ab8bb05b04359d186e4c1229d0b3e67005faacb54a7d71974f73 image \
              --severity HIGH,CRITICAL \
              --vuln-type os,library \
              --ignore-unfixed \
              --ignorefile /.trivyignore \
              --exit-code 1 \
              wyrdfold-api:ci
