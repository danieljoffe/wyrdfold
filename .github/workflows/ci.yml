name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  js:
    name: JS — lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          filter: tree:0
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fails on any known advisory in the production dependency tree.
      # Dev-chain advisories are handled via pnpm overrides (see #21);
      # production must stay at zero.
      - name: Audit production dependencies
        run: pnpm audit --prod

      # run-many (not affected) — only 3 projects; local Nx cache plus the
      # pnpm store cache keep this fast. wyrdfold-api is Python; it runs
      # in the `python` job below.
      - name: Lint, typecheck, test, build
        run: pnpm nx run-many -t lint typecheck test build --exclude=wyrdfold-api --nxBail

  python:
    name: Python — wyrdfold-api
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          filter: tree:0
          fetch-depth: 0
          persist-credentials: false

      # 3.11 to match the production Dockerfile (python:3.11-slim) — test
      # what we ship.
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python dependencies
        run: uv sync --frozen

      # python-docx resume/cover-letter rendering tests shell out to pandoc.
      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Lint, typecheck, test
        working-directory: apps/wyrdfold-api
        run: |
          uv run --package wyrdfold-api ruff check .
          uv run --package wyrdfold-api mypy app/
          uv run --package wyrdfold-api pytest -v
