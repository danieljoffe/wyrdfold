name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  js:
    name: JS — lint, typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          filter: tree:0
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Fails on any known advisory in the production dependency tree.
      # Dev-chain advisories are handled via pnpm overrides (see #21);
      # production must stay at zero.
      - name: Audit production dependencies
        run: pnpm audit --prod

      # run-many (not affected) — only 3 projects; local Nx cache plus the
      # pnpm store cache keep this fast. wyrdfold-api is Python; it runs
      # in the `python` job below.
      - name: Lint, typecheck, test, build
        run: pnpm nx run-many -t lint typecheck test build --exclude=wyrdfold-api --nxBail

  e2e:
    name: E2E — public specs (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          filter: tree:0
          fetch-depth: 0
          persist-credentials: false

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright chromium
        run: pnpm exec playwright install chromium --with-deps

      # Zero-secret by design: with no Supabase env, the playwright config
      # registers only the `public-chromium` project (login form, middleware
      # redirects, security headers). The `setup`/`authed-chromium` projects
      # self-skip — they require real Supabase creds and stay local-only
      # so CI keeps needing no secrets at all.
      - name: Run public e2e specs
        run: pnpm nx e2e wyrdfold-e2e

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: playwright-report
          path: apps/wyrdfold-e2e/test-output/
          retention-days: 7

  python:
    name: Python — wyrdfold-api
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          filter: tree:0
          fetch-depth: 0
          persist-credentials: false

      # 3.11 to match the production Dockerfile (python:3.11-slim) — test
      # what we ship.
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install Python dependencies
        run: uv sync --frozen

      # python-docx resume/cover-letter rendering tests shell out to pandoc.
      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Lint, typecheck, test
        working-directory: apps/wyrdfold-api
        run: |
          uv run --package wyrdfold-api ruff check .
          uv run --package wyrdfold-api mypy app/
          uv run --package wyrdfold-api pytest -v
